<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign up | South African Livestock Atlas</title>
    <script>
      (() => {
        try {
          const savedTheme = localStorage.getItem("south-african-livestock-atlas-theme");
          const preferredTheme = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
          document.documentElement.dataset.theme = savedTheme === "dark" || (!savedTheme && preferredTheme === "dark") ? "dark" : "light";
        } catch {
          document.documentElement.dataset.theme = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        }
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bitter:wght@500;700;800&family=Source+Sans+3:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <div class="ambient ambient-a"></div>
      <div class="ambient ambient-b"></div>

      <main class="auth-page-layout py-4 py-lg-5">
        <section class="auth-page-panel auth-page-panel-wide">
          <div class="auth-page-grid">
            <div class="auth-page-copy">
              <p class="eyebrow mb-2">South African Livestock Atlas</p>
              <h1 class="display-title auth-display-title mb-3" data-auth-copy="auth.signupTitle">Create your account</h1>
              <p class="hero-copy mb-4" data-auth-copy="auth.signupCopy">
                Add your personal details so your profile and future farm submissions are tied to your account.
              </p>

              <div class="auth-inline-tools">
                <button type="button" class="theme-toggle js-theme-toggle" aria-label="Switch to dark mode">
                  <span class="theme-toggle-icon" aria-hidden="true"></span>
                  <span class="theme-toggle-label">Dark mode</span>
                </button>
                <div class="language-switcher">
                  <label class="language-switcher-label" for="languageSelectSignup">Language</label>
                  <select id="languageSelectSignup" class="form-select language-select js-language-select" aria-label="Language selector" data-i18n-aria-label="common.languageSelector">
                    <option value="en" data-i18n="common.lang.en">English</option>
                    <option value="af" data-i18n="common.lang.af">Afrikaans</option>
                  </select>
                </div>
              </div>
            </div>

            <div class="auth-form-card">
              <form id="signupForm" class="auth-form-grid">
                <div class="feedback-grid two-up">
                  <div>
                    <label class="form-label small-label" for="signupFirstName" data-auth-copy="auth.firstName">First name</label>
                    <input id="signupFirstName" name="first_name" class="form-control" type="text" autocomplete="given-name" required />
                  </div>
                  <div>
                    <label class="form-label small-label" for="signupLastName" data-auth-copy="auth.lastName">Last name</label>
                    <input id="signupLastName" name="last_name" class="form-control" type="text" autocomplete="family-name" required />
                  </div>
                </div>

                <div class="feedback-grid two-up">
                  <div>
                    <label class="form-label small-label" for="signupEmail" data-auth-copy="auth.email">Email address</label>
                    <input id="signupEmail" name="email" class="form-control" type="email" autocomplete="email" required />
                  </div>
                  <div>
                    <label class="form-label small-label" for="signupMobile" data-auth-copy="auth.mobileNumber">Mobile number</label>
                    <input id="signupMobile" name="mobile_number" class="form-control" type="text" autocomplete="tel" />
                  </div>
                </div>

                <div>
                  <label class="form-label small-label" for="signupPicture" data-auth-copy="auth.profilePicture">Profile picture URL</label>
                  <input id="signupPicture" name="profile_picture" class="form-control" type="url" placeholder="https://example.com/photo.jpg" />
                  <div class="feedback-upload-note" data-auth-copy="auth.profilePictureHint">Paste an image URL, or leave it blank to use initials.</div>
                </div>

                <div class="feedback-grid two-up">
                  <div>
                    <label class="form-label small-label" for="signupPassword" data-auth-copy="auth.password">Password</label>
                    <input id="signupPassword" name="password" class="form-control" type="password" autocomplete="new-password" required />
                  </div>
                  <div>
                    <label class="form-label small-label" for="signupConfirmPassword" data-auth-copy="auth.confirmPassword">Confirm password</label>
                    <input id="signupConfirmPassword" name="confirm_password" class="form-control" type="password" autocomplete="new-password" required />
                  </div>
                </div>

                <button type="submit" class="feedback-submit-button" data-auth-copy="auth.createAccount">Create account</button>
                <div id="signupStatus" class="feedback-status" aria-live="polite"></div>
              </form>

              <p class="auth-form-footnote mb-0">
                <span data-auth-copy="auth.alreadyHaveAccount">Already have an account?</span>
                <a href="login.html">Log in here</a>
              </p>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
    <script src="i18n.js"></script>
    <script src="auth.js"></script>
  </body>
</html>
