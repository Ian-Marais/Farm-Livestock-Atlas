<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#7a8444" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Agri Atlas" />
    <title>Log in | Agri Atlas</title>
    <script>
      (() => {
        try {
          const savedTheme = localStorage.getItem("south-african-livestock-atlas-theme");
          const preferredTheme = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
          document.documentElement.dataset.theme = savedTheme === "dark" || (!savedTheme && preferredTheme === "dark") ? "dark" : "light";
        } catch {
          document.documentElement.dataset.theme = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        }
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bitter:wght@500;700;800&family=Source+Sans+3:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="icons/icon-192.png" sizes="192x192" type="image/png" />
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
    <link rel="stylesheet" href="styles.css?v=install-app-v3" />
  </head>
  <body>
    <div class="page-shell">
      <div class="ambient ambient-a"></div>
      <div class="ambient ambient-b"></div>

      <main class="auth-page-layout py-4 py-lg-5">
        <section class="auth-page-panel auth-page-panel-wide">
          <div class="auth-page-grid">
            <div class="auth-page-copy">
              <p class="eyebrow mb-2">Agri Atlas</p>
              <h1 class="display-title auth-display-title mb-3" data-auth-copy="auth.loginTitle">Log in to your Agri Atlas account</h1>
              <p class="hero-copy mb-4" data-auth-copy="auth.loginCopy">
                Use your email and password to sign in, manage your profile, and keep your details up to date.
              </p>

              <div class="auth-inline-tools">
                <button type="button" class="theme-toggle js-theme-toggle" aria-label="Switch to dark mode">
                  <span class="theme-toggle-icon" aria-hidden="true"></span>
                  <span class="theme-toggle-label">Dark mode</span>
                </button>
                <div class="language-switcher">
                  <label class="language-switcher-label" for="languageSelectLogin">Language</label>
                  <select id="languageSelectLogin" class="form-select language-select js-language-select" aria-label="Language selector" data-i18n-aria-label="common.languageSelector">
                    <option value="en" data-i18n="common.lang.en">English</option>
                    <option value="af" data-i18n="common.lang.af">Afrikaans</option>
                  </select>
                </div>
              </div>
            </div>

            <div class="auth-form-card">
              <form id="loginForm" class="auth-form-grid">
                <div>
                  <label class="form-label small-label" for="loginEmail" data-auth-copy="auth.email">Email address</label>
                  <input id="loginEmail" name="email" class="form-control form-control-lg" type="email" autocomplete="email" required />
                </div>
                <div>
                  <label class="form-label small-label" for="loginPassword" data-auth-copy="auth.password">Password</label>
                  <input id="loginPassword" name="password" class="form-control form-control-lg" type="password" autocomplete="current-password" required />
                </div>
                <button type="submit" class="feedback-submit-button" data-auth-copy="auth.signIn">Sign in</button>
                <div id="loginStatus" class="feedback-status" aria-live="polite"></div>
              </form>

              <p class="auth-form-footnote mb-0">
                <span data-auth-copy="auth.noAccountYet">Need an account?</span>
                <a href="signup.html">Create one here</a>
              </p>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
    <script src="i18n.js"></script>
    <script src="auth.js?v=install-modal-v5"></script>
    <script src="scroll-controls.js"></script>
  </body>
</html>
